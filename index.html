<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation Sender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Invitation Sender</h1>
            <p>Samuel & Imanuella</p>
        </header>

        <main class="app-main">
            <div class="form-group">
                <label for="guestName">Nama Tamu</label>
                <input type="text" id="guestName" placeholder="Contoh: Budi Santoso" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="guestPhone">Nomor WhatsApp</label>
                <div class="phone-input-wrapper">
                    <input type="tel" id="guestPhone" placeholder="Contoh: 08123456789">
                    <button id="btnPickContact" class="icon-btn" title="Pilih dari Kontak" style="display: none;">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </button>
                </div>
            </div>

            <div class="preview-section">
                <label>Preview Pesan</label>
                <div class="message-preview" id="messagePreview">
                    <!-- Message preview will be generated here -->
                </div>
            </div>

            <button id="btnSendWA" class="btn-primary" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                Kirim via WhatsApp
            </button>
        </main>
    </div>
    <script src="script.js" charset="UTF-8"></script>
</body>
</html>
